
# Server
server:
  port: 8081
  servlet:
    context-path: /

# Actuator
management:
  endpoints:
    web:
      base-path: /
  info:
    git:
      mode: simple
  endpoint:
    health:
      show-details: always

# Spring
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# AWS
aws:
  region: us-east-1
  dynamodb:
    endpoint: http://localhost:8000


# Service management
service:
  account-core:
    baseURL: http://localhost:8080
    connection:
      connect-timeout: 10000
      read-timeout: 10000
      conection-request-timeout: 10000